name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

 Добавляем глобальную переменную для Node.js 24,
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 0,

      
name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:#  Меняем версию на 'latest', чтобы избежать ошибок отсутствия версии
        hugo-version: 'latest'
        extended: true,

      
name: Build with Hugo
      run: hugo --source site --minify,

      
name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./site/public,

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      
name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4