{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    
    <div class="content">
        {{ .Content }}
    </div>
    
    <hr style="margin: 2rem 0;">
    
    <div style="background: #1e1e2f; padding: 2rem; border-radius: 16px; text-align: center; color: white;">
        <h3 style="color: white; margin-top: 0;">🔗 Сохраните эту страницу</h3>
        <p style="margin-bottom: 0;">Здесь собраны все ссылки, которые пригодятся при разработке.</p>
    </div>
</article>
{{ end }}
